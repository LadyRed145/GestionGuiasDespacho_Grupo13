services:

  gestionguiasdespacho:
    image: ladyred/gestionguiasdespacho:latest
    container_name: gestion-guias-despacho

    ports:
      - "8081:8081"

    env_file:
      - .env.docker

    environment:
      SERVER_PORT: 8081

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: "${RABBITMQ_USERNAME:?RABBITMQ_USERNAME no definido}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD no definido}"
      RABBITMQ_VHOST: "${RABBITMQ_VHOST:-/}"

    volumes:
      - "/home/ubuntu/wallet:/wallet:ro"
      - "./guias:/mnt/efs/guias"

    restart: unless-stopped