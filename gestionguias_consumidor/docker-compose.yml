  gestionguias-consumidor:
    build:
      context: ../gestionguias_consumidor
      dockerfile: Dockerfile

    image: ladyred/gestionguias-consumidor:latest
    container_name: gestion-guias-consumidor

    env_file:
      - ../gestionguias_consumidor/.env

    environment:
      SERVER_PORT: 8082

      JAVA_TOOL_OPTIONS: "-Doracle.jdbc.javaNetNio=false"

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      
    volumes:
      - "/home/natalia/wallets/wallet3:/wallet:ro"

    ports:
      - "8082:8082"

    depends_on:
      rabbitmq:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - gestionguias-network
