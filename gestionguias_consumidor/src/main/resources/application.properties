# ==============================================================================
# APLICACION
# ==============================================================================

spring.application.name=gestionguias-consumidor
spring.config.import=optional:file:.env[.properties]
server.port=8082

# ==============================================================================
# ORACLE CLOUD DATABASE - WALLET
# ==============================================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ==============================================================================
# JPA / HIBERNATE
# ==============================================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# ==============================================================================
# AWS S3
# Se mantendra temporalmente hasta el paso de limpieza del consumidor
# ==============================================================================

aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:gestion-guias-despacho-grupo13}

# ==============================================================================
# EFS
# Se mantendra temporalmente hasta el paso de limpieza del consumidor
# ==============================================================================

app.efs.base-path=${EFS_BASE_PATH:/mnt/efs/guias}

# ==============================================================================
# AZURE AD B2C / JWT
# ==============================================================================

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_ISSUER_URI:}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AZURE_JWK_SET_URI:}
spring.security.oauth2.resourceserver.jwt.audiences=${AZURE_AUDIENCE}

# ==============================================================================
# CONEXION RABBITMQ
# ==============================================================================

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guias_app}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guias_app_local}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.connection-timeout=${RABBITMQ_CONNECTION_TIMEOUT:5s}

# ==============================================================================
# CONFIRMACION Y REINTENTOS RABBITMQ
# ==============================================================================

spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true

spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=500ms
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.multiplier=2
spring.rabbitmq.template.retry.max-interval=2s

# ==============================================================================
# COLA PRINCIPAL COMPARTIDA CON EL PRODUCTOR
# ==============================================================================

app.rabbitmq.guias.exchange=${RABBITMQ_GUIAS_EXCHANGE:guias.despacho.exchange}
app.rabbitmq.guias.queue=${RABBITMQ_GUIAS_QUEUE:guias.despacho.queue}
app.rabbitmq.guias.routing-key=${RABBITMQ_GUIAS_ROUTING_KEY:guias.despacho}

# ==============================================================================
# COLA DE ERRORES
# ==============================================================================

app.rabbitmq.errores.exchange=${RABBITMQ_ERRORES_EXCHANGE:guias.despacho.error.exchange}
app.rabbitmq.errores.queue=${RABBITMQ_ERRORES_QUEUE:guias.despacho.error.queue}
app.rabbitmq.errores.routing-key=${RABBITMQ_ERRORES_ROUTING_KEY:guias.despacho.error}

# ==============================================================================
# CONSUMIDOR RABBITMQ
# ==============================================================================

app.rabbitmq.consumer.timeout-ms=${RABBITMQ_CONSUMER_TIMEOUT_MS:2000}

# ==============================================================================
# SWAGGER / OPENAPI
# ==============================================================================

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

app.api-gateway.url=${API_GATEWAY_URL:http://localhost:8082}

# ==============================================================================
# ACTUATOR
# ==============================================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# ==============================================================================
# RESPUESTAS DE ERROR
# ==============================================================================

server.error.include-message=never
server.error.include-binding-errors=never

# ==============================================================================
# JSON
# ==============================================================================

spring.jackson.deserialization.fail-on-unknown-properties=true