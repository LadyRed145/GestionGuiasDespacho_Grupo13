services:

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gestion-guias-rabbitmq

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guias_app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guias_app_local}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    restart: unless-stopped

    networks:
      - gestionguias-network


  gestionguias-productor:
    build:
      context: ..
      dockerfile: Dockerfile

    image: ladyred/gestionguiasdespacho:latest
    container_name: gestion-guias-productor

    ports:
      - "8081:8081"

    env_file:
      - ../.env

    environment:
      SERVER_PORT: 8081

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guias_app}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guias_app_local}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}

    depends_on:
      rabbitmq:
        condition: service_healthy

    volumes:
      - "/home/natalia/Archivos/Desarrollo Cloud Native/Wallets Registradas/Wallet_Semana3:/home/natalia/wallets/wallet3:ro"
      - "../guias:/mnt/efs/guias"

    restart: "no"

    networks:
      - gestionguias-network


  gestionguias-consumidor:
    build:
      context: ../gestionguias_consumidor
      dockerfile: Dockerfile

    image: ladyred/gestionguias-consumidor:latest
    container_name: gestion-guias-consumidor

    ports:
      - "8082:8082"

    env_file:
      - ../gestionguias_consumidor/.env

    environment:
      SERVER_PORT: 8082

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guias_app}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guias_app_local}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}

    depends_on:
      rabbitmq:
        condition: service_healthy

    volumes:
      - "/home/natalia/Archivos/Desarrollo Cloud Native/Wallets Registradas/Wallet_Semana3:/home/natalia/wallets/wallet3:ro"
      - "../gestionguias_consumidor/guias:/mnt/efs/guias"

    restart: "no"

    networks:
      - gestionguias-network


volumes:
  rabbitmq_data:


networks:
  gestionguias-network:
    name: gestionguias-network
    driver: bridge
