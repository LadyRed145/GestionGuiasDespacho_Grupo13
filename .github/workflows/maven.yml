name: CI/CD Gestión Guías Despacho

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gestion-guias-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-and-push:
    name: Compilar y publicar microservicios
    runs-on: ubuntu-latest

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}

      EFS_BASE_PATH: ${{ secrets.EFS_BASE_PATH }}

      AZURE_ISSUER_URI: ${{ secrets.AZURE_ISSUER_URI }}
      AZURE_JWK_SET_URI: ${{ secrets.AZURE_JWK_SET_URI }}
      AZURE_AUDIENCE: ${{ secrets.AZURE_AUDIENCE }}

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
      RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
      RABBITMQ_VHOST: /

      RABBITMQ_GUIAS_EXCHANGE: guias.despacho.exchange
      RABBITMQ_GUIAS_QUEUE: guias.despacho.queue
      RABBITMQ_GUIAS_ROUTING_KEY: guias.despacho

      RABBITMQ_ERRORES_EXCHANGE: guias.despacho.error.exchange
      RABBITMQ_ERRORES_QUEUE: guias.despacho.error.queue
      RABBITMQ_ERRORES_ROUTING_KEY: guias.despacho.error

    steps:

      # ============================================================
      # PREPARACIÓN
      # ============================================================

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: |
            pom.xml
            gestionguias_consumidor/pom.xml

      - name: Dar permisos a Maven Wrapper
        run: |
          chmod +x mvnw
          chmod +x gestionguias_consumidor/mvnw

      # ============================================================
      # PRODUCTOR
      # ============================================================

      - name: Compilar microservicio productor
        run: |
          ./mvnw \
            --batch-mode \
            clean package \
            -DskipTests

      - name: Comprobar JAR del productor
        run: |
          test -f target/gestionguiasdespacho-0.0.1-SNAPSHOT.jar

          echo "JAR del productor generado:"
          ls -lh target/*.jar

      # ============================================================
      # CONSUMIDOR
      # ============================================================

      - name: Compilar microservicio consumidor
        working-directory: gestionguias_consumidor
        run: |
          ./mvnw \
            --batch-mode \
            clean package \
            -DskipTests

      - name: Comprobar JAR del consumidor
        run: |
          test -f gestionguias_consumidor/target/gestionguias-consumidor.jar

          echo "JAR del consumidor generado:"
          ls -lh gestionguias_consumidor/target/*.jar

      # ============================================================
      # DOCKER
      # ============================================================

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ============================================================
      # IMAGEN PRODUCTOR
      # ============================================================

      - name: Construir y publicar imagen del productor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true

          tags: |
            ladyred/gestionguiasdespacho:latest
            ladyred/gestionguiasdespacho:sha-${{ github.sha }}

          cache-from: type=gha,scope=gestionguias-productor
          cache-to: type=gha,mode=max,scope=gestionguias-productor

      # ============================================================
      # IMAGEN CONSUMIDOR
      # ============================================================

      - name: Construir y publicar imagen del consumidor
        uses: docker/build-push-action@v6
        with:
          context: ./gestionguias_consumidor
          file: ./gestionguias_consumidor/Dockerfile
          push: true

          tags: |
            ladyred/gestionguias-consumidor:latest
            ladyred/gestionguias-consumidor:sha-${{ github.sha }}

          cache-from: type=gha,scope=gestionguias-consumidor
          cache-to: type=gha,mode=max,scope=gestionguias-consumidor

      # ============================================================
      # RESUMEN
      # ============================================================

      - name: Mostrar resumen de publicación
        run: |
          echo "=============================================="
          echo " IMÁGENES PUBLICADAS CORRECTAMENTE"
          echo "=============================================="
          echo
          echo "Productor:"
          echo "ladyred/gestionguiasdespacho:latest"
          echo "ladyred/gestionguiasdespacho:sha-${GITHUB_SHA}"
          echo
          echo "Consumidor:"
          echo "ladyred/gestionguias-consumidor:latest"
          echo "ladyred/gestionguias-consumidor:sha-${GITHUB_SHA}"


  deploy-ec2:
    name: Desplegar stack completo en EC2
    runs-on: ubuntu-latest

    needs:
      - build-and-push

    /*
     * El despliegue quedará preparado, pero no se ejecutará hasta
     * crear en GitHub la variable ENABLE_EC2_DEPLOY con valor true.
     *
     * Esto evita romper el EC2 actual antes de preparar allá:
     * - el consumidor;
     * - el Compose productivo del stack;
     * - la Wallet;
     * - los puertos y volúmenes.
     */
    if: ${{ vars.ENABLE_EC2_DEPLOY == 'true' }}

    steps:

      - name: Desplegar monorepo en EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script_stop: true
          command_timeout: 15m

          script: |
            set -Eeuo pipefail

            cd ~/gestionguiasdespacho

            echo
            echo "=============================================="
            echo " ACTUALIZANDO MONOREPO"
            echo "=============================================="

            git pull --ff-only origin main
            git log -1 --oneline

            echo
            echo "=============================================="
            echo " VALIDANDO STACK PRODUCTIVO"
            echo "=============================================="

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              config --quiet

            echo
            echo "=============================================="
            echo " DESCARGANDO IMÁGENES"
            echo "=============================================="

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              pull

            echo
            echo "=============================================="
            echo " RECREANDO STACK"
            echo "=============================================="

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              down --remove-orphans

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              up -d \
              --force-recreate \
              --remove-orphans

            echo
            echo "=============================================="
            echo " ESTADO DEL STACK"
            echo "=============================================="

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              ps

            docker image prune -f
