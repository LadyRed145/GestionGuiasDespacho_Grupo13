name: CI/CD Gestion Guias Despacho

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gestion-guias-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-push:
    name: Compilar y publicar microservicios
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # ============================================================
      # ORACLE
      # ============================================================

      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # ============================================================
      # AWS
      # ============================================================

      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}

      # ============================================================
      # EFS
      # ============================================================

      EFS_BASE_PATH: ${{ secrets.EFS_BASE_PATH }}

      # ============================================================
      # AZURE AD B2C
      # ============================================================

      AZURE_ISSUER_URI: ${{ secrets.AZURE_ISSUER_URI }}
      AZURE_JWK_SET_URI: ${{ secrets.AZURE_JWK_SET_URI }}
      AZURE_AUDIENCE: ${{ secrets.AZURE_AUDIENCE }}

      # ============================================================
      # RABBITMQ PARA GITHUB ACTIONS
      # ============================================================

      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guias_ci
      RABBITMQ_PASSWORD: guias_ci_local
      RABBITMQ_VHOST: /

      RABBITMQ_GUIAS_EXCHANGE: guias.despacho.exchange
      RABBITMQ_GUIAS_QUEUE: guias.despacho.queue
      RABBITMQ_GUIAS_ROUTING_KEY: guias.despacho

      RABBITMQ_ERRORES_EXCHANGE: guias.despacho.error.exchange
      RABBITMQ_ERRORES_QUEUE: guias.despacho.error.queue
      RABBITMQ_ERRORES_ROUTING_KEY: guias.despacho.error

    services:

      rabbitmq:
        image: rabbitmq:3.13-management-alpine

        env:
          RABBITMQ_DEFAULT_USER: guias_ci
          RABBITMQ_DEFAULT_PASS: guias_ci_local
          RABBITMQ_DEFAULT_VHOST: /

        ports:
          - 5672:5672
          - 15672:15672

        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 20s

    steps:

      # ============================================================
      # PREPARACIÓN
      # ============================================================

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: |
            pom.xml
            gestionguias_consumidor/pom.xml

      - name: Dar permisos a Maven Wrapper
        run: |
          chmod +x mvnw
          chmod +x gestionguias_consumidor/mvnw

      - name: Validar estructura del monorepo
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f pom.xml
          test -f Dockerfile
          test -x mvnw

          test -d gestionguias_consumidor
          test -f gestionguias_consumidor/pom.xml
          test -f gestionguias_consumidor/Dockerfile
          test -x gestionguias_consumidor/mvnw

          test -d gestionguias-stack
          test -f gestionguias-stack/docker-compose.yml
          test -f gestionguias-stack/docker-compose.prod.yml

          echo "Estructura del monorepo validada correctamente."

      - name: Validar secretos de construcción
        shell: bash
        run: |
          set -Eeuo pipefail

          validar_variable() {
            local nombre="$1"
            local valor="$2"

            if [ -z "$valor" ]; then
              echo "::error::El secreto ${nombre} no está configurado."
              exit 1
            fi
          }

          validar_variable "DB_URL" "$DB_URL"
          validar_variable "DB_USERNAME" "$DB_USERNAME"
          validar_variable "DB_PASSWORD" "$DB_PASSWORD"

          validar_variable "AWS_REGION" "$AWS_REGION"
          validar_variable "AWS_S3_BUCKET_NAME" "$AWS_S3_BUCKET_NAME"
          validar_variable "EFS_BASE_PATH" "$EFS_BASE_PATH"

          validar_variable "AZURE_ISSUER_URI" "$AZURE_ISSUER_URI"
          validar_variable "AZURE_JWK_SET_URI" "$AZURE_JWK_SET_URI"
          validar_variable "AZURE_AUDIENCE" "$AZURE_AUDIENCE"

          echo "Secretos de construcción configurados."

      # ============================================================
      # RABBITMQ EN CI
      # ============================================================

      - name: Verificar RabbitMQ de CI
        shell: bash
        run: |
          set -Eeuo pipefail

          rabbit_ok=0

          for intento in $(seq 1 30); do
            if curl \
              --fail \
              --silent \
              --show-error \
              --user "${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}" \
              http://localhost:15672/api/overview \
              >/tmp/rabbitmq-overview.json
            then
              rabbit_ok=1
              break
            fi

            echo "Esperando RabbitMQ... ${intento}/30"
            sleep 2
          done

          if [ "$rabbit_ok" -ne 1 ]; then
            echo "::error::RabbitMQ no respondió dentro del tiempo esperado."
            exit 1
          fi

          echo "RabbitMQ de CI operativo."

      # ============================================================
      # PRODUCTOR
      # ============================================================

      - name: Compilar microservicio productor
        shell: bash
        run: |
          set -Eeuo pipefail

          ./mvnw \
            --batch-mode \
            --no-transfer-progress \
            clean package \
            -DskipTests

      - name: Verificar JAR del productor
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f \
            target/gestionguiasdespacho-0.0.1-SNAPSHOT.jar

          echo "JAR generado por el productor:"
          ls -lh target/*.jar

      # ============================================================
      # CONSUMIDOR
      # ============================================================

      - name: Compilar microservicio consumidor
        working-directory: gestionguias_consumidor
        shell: bash
        run: |
          set -Eeuo pipefail

          ./mvnw \
            --batch-mode \
            --no-transfer-progress \
            clean package \
            -DskipTests

      - name: Verificar JAR del consumidor
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f \
            gestionguias_consumidor/target/gestionguias-consumidor.jar

          echo "JAR generado por el consumidor:"
          ls -lh gestionguias_consumidor/target/*.jar

      # ============================================================
      # DOCKER HUB
      # ============================================================

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ============================================================
      # IMAGEN DEL PRODUCTOR
      # ============================================================

      - name: Construir y publicar productor
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ladyred/gestionguiasdespacho:latest
            ladyred/gestionguiasdespacho:sha-${{ github.sha }}
          cache-from: type=gha,scope=productor
          cache-to: type=gha,mode=max,scope=productor

      # ============================================================
      # IMAGEN DEL CONSUMIDOR
      # ============================================================

      - name: Construir y publicar consumidor
        uses: docker/build-push-action@v7
        with:
          context: ./gestionguias_consumidor
          file: ./gestionguias_consumidor/Dockerfile
          push: true
          tags: |
            ladyred/gestionguias-consumidor:latest
            ladyred/gestionguias-consumidor:sha-${{ github.sha }}
          cache-from: type=gha,scope=consumidor
          cache-to: type=gha,mode=max,scope=consumidor

      # ============================================================
      # RESUMEN DE PUBLICACIÓN
      # ============================================================

      - name: Mostrar resumen de imágenes
        shell: bash
        run: |
          echo "======================================================"
          echo " IMÁGENES PUBLICADAS"
          echo "======================================================"
          echo
          echo "Productor:"
          echo "ladyred/gestionguiasdespacho:latest"
          echo "ladyred/gestionguiasdespacho:sha-${GITHUB_SHA}"
          echo
          echo "Consumidor:"
          echo "ladyred/gestionguias-consumidor:latest"
          echo "ladyred/gestionguias-consumidor:sha-${GITHUB_SHA}"


  deploy-ec2:
    name: Desplegar stack completo en EC2
    runs-on: ubuntu-latest
    timeout-minutes: 25

    needs:
      - build-push

    steps:

      - name: Desplegar productor consumidor y RabbitMQ
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          command_timeout: 20m

          script: |
            set -Eeuo pipefail

            PROYECTO="$HOME/gestionguiasdespacho"
            COMPOSE_ARCHIVO="gestionguias-stack/docker-compose.prod.yml"
            ENV_ARCHIVO=".env.docker"

            mostrar_diagnostico() {
              echo
              echo "======================================================"
              echo " DIAGNÓSTICO DEL DESPLIEGUE"
              echo "======================================================"

              cd "$PROYECTO" 2>/dev/null || true

              docker compose \
                --env-file "$ENV_ARCHIVO" \
                -f "$COMPOSE_ARCHIVO" \
                ps -a \
                2>/dev/null || true

              echo
              echo "Últimos logs disponibles:"

              docker compose \
                --env-file "$ENV_ARCHIVO" \
                -f "$COMPOSE_ARCHIVO" \
                logs --tail=150 \
                2>/dev/null || true
            }

            trap mostrar_diagnostico ERR

            echo
            echo "======================================================"
            echo " 1. VALIDANDO DOCKER EN EC2"
            echo "======================================================"

            if ! docker info >/dev/null 2>&1; then
              echo "Docker no está disponible. Intentando iniciarlo..."
              sudo systemctl start docker
              sleep 5
            fi

            docker info >/dev/null

            echo "Docker operativo."

            echo
            echo "======================================================"
            echo " 2. ACTUALIZANDO MONOREPO"
            echo "======================================================"

            cd "$PROYECTO"

            git fetch origin
            git pull --ff-only origin main
            git log -1 --oneline

            echo
            echo "======================================================"
            echo " 3. VALIDANDO ARCHIVOS PRODUCTIVOS"
            echo "======================================================"

            exigir_archivo() {
              local archivo="$1"

              if [ ! -f "$archivo" ]; then
                echo "ERROR: no existe el archivo:"
                echo "$archivo"
                exit 1
              fi
            }

            exigir_directorio() {
              local directorio="$1"

              if [ ! -d "$directorio" ]; then
                echo "ERROR: no existe el directorio:"
                echo "$directorio"
                exit 1
              fi
            }

            exigir_archivo "$ENV_ARCHIVO"
            exigir_archivo "$COMPOSE_ARCHIVO"
            exigir_directorio "/home/ubuntu/wallet"
            exigir_directorio "$PROYECTO/guias"

            for archivo_wallet in \
              cwallet.sso \
              ewallet.p12 \
              sqlnet.ora \
              tnsnames.ora
            do
              exigir_archivo "/home/ubuntu/wallet/${archivo_wallet}"
            done

            chmod 600 "$ENV_ARCHIVO"

            docker compose \
              --env-file "$ENV_ARCHIVO" \
              -f "$COMPOSE_ARCHIVO" \
              config --quiet

            echo "Configuración productiva válida."

            echo
            echo "======================================================"
            echo " 4. DETENIENDO DESPLIEGUES ANTERIORES"
            echo "======================================================"

            docker compose \
              --env-file "$ENV_ARCHIVO" \
              -f "$COMPOSE_ARCHIVO" \
              down --remove-orphans \
              2>/dev/null || true

            docker compose \
              --env-file "$ENV_ARCHIVO" \
              -f docker-compose.prod.yml \
              down --remove-orphans \
              2>/dev/null || true

            docker rm -f \
              gestion-guias-rabbitmq \
              gestion-guias-rabbitmq-consumidor \
              gestion-guias-despacho \
              gestion-guias-productor \
              gestion-guias-consumidor \
              2>/dev/null || true

            echo
            echo "======================================================"
            echo " 5. LIBERANDO PUERTOS"
            echo "======================================================"

            for puerto in 5672 15672 8081 8082; do
              contenedores="$(
                docker ps -aq \
                  --filter "publish=${puerto}"
              )"

              if [ -n "$contenedores" ]; then
                docker rm -f $contenedores \
                  >/dev/null 2>&1 || true
              fi
            done

            sleep 2

            proxies="$(
              sudo ss -ltnp 2>/dev/null \
                | grep -E ':(5672|15672|8081|8082)[[:space:]]' \
                | grep docker-proxy \
                | grep -oP 'pid=\K[0-9]+' \
                | sort -u \
                || true
            )"

            if [ -n "$proxies" ]; then
              echo "Eliminando docker-proxy huérfanos:"
              echo "$proxies"

              sudo kill -9 $proxies \
                >/dev/null 2>&1 || true

              sleep 2
            fi

            conflictos="$(
              sudo ss -ltnp 2>/dev/null \
                | grep -E ':(5672|15672|8081|8082)[[:space:]]' \
                || true
            )"

            if [ -n "$conflictos" ]; then
              echo "ERROR: todavía existen puertos ocupados:"
              echo "$conflictos"
              exit 1
            fi

            echo "Puertos del stack disponibles."

            echo
            echo "======================================================"
            echo " 6. DESCARGANDO IMÁGENES"
            echo "======================================================"

            docker compose \
              --env-file "$ENV_ARCHIVO" \
              -f "$COMPOSE_ARCHIVO" \
              pull

            echo
            echo "======================================================"
            echo " 7. LEVANTANDO STACK PRODUCTIVO"
            echo "======================================================"

            docker compose \
              --env-file "$ENV_ARCHIVO" \
              -f "$COMPOSE_ARCHIVO" \
              up -d \
              --force-recreate \
              --remove-orphans

            echo
            echo "======================================================"
            echo " 8. ESPERANDO RABBITMQ"
            echo "======================================================"

            rabbit_ok=0

            for intento in $(seq 1 40); do
              estado="$(
                docker inspect \
                  --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
                  gestion-guias-rabbitmq \
                  2>/dev/null || true
              )"

              if [ "$estado" = "healthy" ]; then
                rabbit_ok=1
                break
              fi

              echo "Esperando RabbitMQ... ${intento}/40"
              sleep 3
            done

            if [ "$rabbit_ok" -ne 1 ]; then
              echo "ERROR: RabbitMQ no alcanzó estado healthy."

              docker compose \
                --env-file "$ENV_ARCHIVO" \
                -f "$COMPOSE_ARCHIVO" \
                logs --tail=150 rabbitmq

              exit 1
            fi

            echo "RabbitMQ operativo."

            echo
            echo "======================================================"
            echo " 9. ESPERANDO PRODUCTOR"
            echo "======================================================"

            productor_ok=0

            for intento in $(seq 1 50); do
              if curl -fsS \
                http://localhost:8081/actuator/health \
                >/tmp/productor-health.json \
                2>/dev/null
              then
                productor_ok=1
                break
              fi

              if curl -fsS \
                http://localhost:8081/api/health \
                >/tmp/productor-health.json \
                2>/dev/null
              then
                productor_ok=1
                break
              fi

              echo "Esperando productor... ${intento}/50"
              sleep 3
            done

            if [ "$productor_ok" -ne 1 ]; then
              echo "ERROR: el productor no respondió."

              docker compose \
                --env-file "$ENV_ARCHIVO" \
                -f "$COMPOSE_ARCHIVO" \
                logs --tail=200 gestionguias-productor

              exit 1
            fi

            cat /tmp/productor-health.json
            echo
            echo "Productor operativo."

            echo
            echo "======================================================"
            echo " 10. ESPERANDO CONSUMIDOR"
            echo "======================================================"

            consumidor_ok=0

            for intento in $(seq 1 50); do
              if curl -fsS \
                http://localhost:8082/api/consumidor/health \
                >/tmp/consumidor-health.json \
                2>/dev/null
              then
                consumidor_ok=1
                break
              fi

              echo "Esperando consumidor... ${intento}/50"
              sleep 3
            done

            if [ "$consumidor_ok" -ne 1 ]; then
              echo "ERROR: el consumidor no respondió."

              docker compose \
                --env-file "$ENV_ARCHIVO" \
                -f "$COMPOSE_ARCHIVO" \
                logs --tail=200 gestionguias-consumidor

              exit 1
            fi

            cat /tmp/consumidor-health.json
            echo
            echo "Consumidor operativo."

            echo
            echo "======================================================"
            echo " 11. ESTADO FINAL"
            echo "======================================================"

            docker compose \
              --env-file "$ENV_ARCHIVO" \
              -f "$COMPOSE_ARCHIVO" \
              ps

            docker image prune -f

            echo
            echo "======================================================"
            echo " DESPLIEGUE COMPLETADO CORRECTAMENTE"
            echo "======================================================"
