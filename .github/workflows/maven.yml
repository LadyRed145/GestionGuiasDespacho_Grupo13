name: CI/CD Gestion Guias Despacho

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gestion-guias-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-push:
    name: Compilar y publicar microservicios
    runs-on: ubuntu-latest

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}

      EFS_BASE_PATH: ${{ secrets.EFS_BASE_PATH }}

      AZURE_ISSUER_URI: ${{ secrets.AZURE_ISSUER_URI }}
      AZURE_JWK_SET_URI: ${{ secrets.AZURE_JWK_SET_URI }}
      AZURE_AUDIENCE: ${{ secrets.AZURE_AUDIENCE }}

      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
      RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
      RABBITMQ_VHOST: /

      RABBITMQ_GUIAS_EXCHANGE: guias.despacho.exchange
      RABBITMQ_GUIAS_QUEUE: guias.despacho.queue
      RABBITMQ_GUIAS_ROUTING_KEY: guias.despacho

      RABBITMQ_ERRORES_EXCHANGE: guias.despacho.error.exchange
      RABBITMQ_ERRORES_QUEUE: guias.despacho.error.queue
      RABBITMQ_ERRORES_ROUTING_KEY: guias.despacho.error

    services:
      rabbitmq:
        image: rabbitmq:3.13-management-alpine

        env:
          RABBITMQ_DEFAULT_USER: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_DEFAULT_PASS: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_DEFAULT_VHOST: /

        ports:
          - 5672:5672
          - 15672:15672

        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: |
            pom.xml
            gestionguias_consumidor/pom.xml

      - name: Dar permisos a Maven Wrapper
        run: |
          chmod +x mvnw
          chmod +x gestionguias_consumidor/mvnw

      - name: Verificar RabbitMQ
        run: |
          for intento in {1..30}; do
            if curl -fsS http://localhost:15672 >/dev/null 2>&1; then
              echo "RabbitMQ operativo."
              exit 0
            fi

            echo "Esperando RabbitMQ... ${intento}/30"
            sleep 2
          done

          echo "RabbitMQ no respondió."
          exit 1

      - name: Compilar microservicio productor
        run: ./mvnw clean package -DskipTests

      - name: Verificar JAR del productor
        run: |
          echo "JAR generado por el productor:"
          ls -lh target/*.jar
          test -f target/gestionguiasdespacho-0.0.1-SNAPSHOT.jar

      - name: Compilar microservicio consumidor
        working-directory: gestionguias_consumidor
        run: ./mvnw clean package -DskipTests

      - name: Verificar JAR del consumidor
        run: |
          echo "JAR generado por el consumidor:"
          ls -lh gestionguias_consumidor/target/*.jar
          test -f gestionguias_consumidor/target/gestionguias-consumidor.jar

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar productor
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ladyred/gestionguiasdespacho:latest
            ladyred/gestionguiasdespacho:sha-${{ github.sha }}
          cache-from: type=gha,scope=productor
          cache-to: type=gha,mode=max,scope=productor

      - name: Construir y publicar consumidor
        uses: docker/build-push-action@v7
        with:
          context: ./gestionguias_consumidor
          file: ./gestionguias_consumidor/Dockerfile
          push: true
          tags: |
            ladyred/gestionguias-consumidor:latest
            ladyred/gestionguias-consumidor:sha-${{ github.sha }}
          cache-from: type=gha,scope=consumidor
          cache-to: type=gha,mode=max,scope=consumidor

      - name: Resumen de imagenes
        run: |
          echo "Productor publicado:"
          echo "ladyred/gestionguiasdespacho:latest"
          echo "ladyred/gestionguiasdespacho:sha-${GITHUB_SHA}"

          echo
          echo "Consumidor publicado:"
          echo "ladyred/gestionguias-consumidor:latest"
          echo "ladyred/gestionguias-consumidor:sha-${GITHUB_SHA}"


  deploy-ec2:
    name: Desplegar stack completo en EC2
    runs-on: ubuntu-latest

    needs:
      - build-push

    steps:

      - name: Desplegar productor consumidor y RabbitMQ
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script_stop: true
          command_timeout: 20m

          script: |
            set -Eeuo pipefail

            cd ~/gestionguiasdespacho

            echo
            echo "======================================================"
            echo " 1. ACTUALIZANDO MONOREPO"
            echo "======================================================"

            git fetch origin
            git pull --ff-only origin main
            git log -1 --oneline

            echo
            echo "======================================================"
            echo " 2. VALIDANDO ARCHIVOS PRODUCTIVOS"
            echo "======================================================"

            test -f .env.docker
            test -f gestionguias-stack/docker-compose.prod.yml
            test -d /home/ubuntu/wallet

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              config --quiet

            echo "Configuracion productiva valida."

            echo
            echo "======================================================"
            echo " 3. DETENIENDO DESPLIEGUE ANTERIOR"
            echo "======================================================"

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              down --remove-orphans \
              2>/dev/null || true

            docker rm -f \
              gestion-guias-rabbitmq \
              gestion-guias-despacho \
              gestion-guias-productor \
              gestion-guias-consumidor \
              2>/dev/null || true

            echo
            echo "======================================================"
            echo " 4. LIBERANDO PUERTOS"
            echo "======================================================"

            for puerto in 5672 15672 8081 8082; do
              contenedores="$(docker ps -aq --filter "publish=${puerto}")"

              if [ -n "$contenedores" ]; then
                docker rm -f $contenedores || true
              fi
            done

            sleep 2

            proxies="$(
              sudo ss -ltnp 2>/dev/null \
                | grep -E ':(5672|15672|8081|8082)[[:space:]]' \
                | grep docker-proxy \
                | grep -oP 'pid=\K[0-9]+' \
                | sort -u \
                || true
            )"

            if [ -n "$proxies" ]; then
              sudo kill -9 $proxies || true
              sleep 2
            fi

            echo
            echo "======================================================"
            echo " 5. DESCARGANDO IMAGENES"
            echo "======================================================"

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              pull

            echo
            echo "======================================================"
            echo " 6. LEVANTANDO STACK"
            echo "======================================================"

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              up -d \
              --force-recreate \
              --remove-orphans

            echo
            echo "======================================================"
            echo " 7. ESPERANDO RABBITMQ"
            echo "======================================================"

            rabbit_ok=0

            for intento in $(seq 1 40); do
              estado="$(
                docker inspect \
                  --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
                  gestion-guias-rabbitmq \
                  2>/dev/null || true
              )"

              if [ "$estado" = "healthy" ]; then
                rabbit_ok=1
                break
              fi

              echo "Esperando RabbitMQ... ${intento}/40"
              sleep 3
            done

            if [ "$rabbit_ok" -ne 1 ]; then
              echo "RabbitMQ no alcanzo estado healthy."

              docker compose \
                --env-file .env.docker \
                -f gestionguias-stack/docker-compose.prod.yml \
                logs --tail=150 rabbitmq

              exit 1
            fi

            echo "RabbitMQ operativo."

            echo
            echo "======================================================"
            echo " 8. ESPERANDO PRODUCTOR"
            echo "======================================================"

            productor_ok=0

            for intento in $(seq 1 50); do
              if curl -fsS \
                http://localhost:8081/actuator/health \
                >/tmp/productor-health.json \
                2>/dev/null
              then
                productor_ok=1
                break
              fi

              echo "Esperando productor... ${intento}/50"
              sleep 3
            done

            if [ "$productor_ok" -ne 1 ]; then
              echo "El productor no respondio."

              docker compose \
                --env-file .env.docker \
                -f gestionguias-stack/docker-compose.prod.yml \
                logs --tail=200 gestionguias-productor

              exit 1
            fi

            cat /tmp/productor-health.json
            echo

            echo
            echo "======================================================"
            echo " 9. ESPERANDO CONSUMIDOR"
            echo "======================================================"

            consumidor_ok=0

            for intento in $(seq 1 50); do
              if curl -fsS \
                http://localhost:8082/api/consumidor/health \
                >/tmp/consumidor-health.json \
                2>/dev/null
              then
                consumidor_ok=1
                break
              fi

              echo "Esperando consumidor... ${intento}/50"
              sleep 3
            done

            if [ "$consumidor_ok" -ne 1 ]; then
              echo "El consumidor no respondio."

              docker compose \
                --env-file .env.docker \
                -f gestionguias-stack/docker-compose.prod.yml \
                logs --tail=200 gestionguias-consumidor

              exit 1
            fi

            cat /tmp/consumidor-health.json
            echo

            echo
            echo "======================================================"
            echo " 10. ESTADO FINAL"
            echo "======================================================"

            docker compose \
              --env-file .env.docker \
              -f gestionguias-stack/docker-compose.prod.yml \
              ps

            docker image prune -f
