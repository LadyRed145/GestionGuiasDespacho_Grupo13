services:

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gestion-guias-rabbitmq

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guias_app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guias_app_local}

    ports:
      - "15672:15672"

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 10

    restart: unless-stopped


  gestionguiasdespacho:
    build:
      context: .
      dockerfile: Dockerfile

    image: ladyred/gestionguiasdespacho:latest
    container_name: gestion-guias-despacho

    ports:
      - "8081:8081"

    env_file:
      - .env

    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guias_app}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guias_app_local}

    depends_on:
      rabbitmq:
        condition: service_healthy

    volumes:
      - "/home/natalia/Archivos/Desarrollo Cloud Native/Wallets Registradas/Wallet_Semana3:/home/natalia/wallets/wallet3:ro"
      - "./guias:/mnt/efs/guias"

    restart: "no"


volumes:
  rabbitmq_data:
